# Render Blueprint — деплой backend (FastAPI + WebSocket).
# Использование: Render Dashboard → New → Blueprint → выбрать этот репозиторий.
# DATABASE_URL (Neon), CORS_ORIGINS и FRONTEND_URL заполняются вручную после
# создания БД на Vercel Storage / получения URL фронта на Vercel (см. docs/03-SETUP-DEPLOY.md).
services:
  - type: web
    name: spi-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MIN
        value: "15"
      - key: JWT_REFRESH_TTL_DAYS
        value: "30"
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_LOCAL_PATH
        value: /data/uploads
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: noreply@spi-messenger.ru
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@spi-messenger.ru
      - key: REDIS_URL
        sync: false
