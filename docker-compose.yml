# Прод-стек SPI Messenger на одном сервере (ADR-023, см. docs/03-SETUP-DEPLOY.md).
# Один origin: Caddy (авто-HTTPS) отдаёт статику фронта и проксирует FastAPI + WS.
# Запуск:  docker compose up -d
# Секреты и домен — в .env рядом с этим файлом (шаблон: .env.example).
name: spi-messenger

services:
  # Caddy: TLS/HTTPS (Let's Encrypt), статика фронта, reverse-proxy на api (вкл. /ws).
  caddy:
    image: caddy:2-alpine
    depends_on:
      api:
        condition: service_started
      frontend-build:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env, e.g. demo.spi-2015.ru or :80 for local http}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  # Одноразовая сборка фронта: кладёт dist в общий том frontend_dist и завершается.
  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/out
    command: sh -c "rm -rf /out/* && cp -r /app/dist/. /out/"

  # FastAPI + WebSocket + планировщик. ОДИН процесс (uvicorn --workers 1):
  # ConnectionManager и планировщик живут в памяти процесса (ADR-018, ADR-023).
  # Миграции (alembic upgrade head) накатываются на старте — см. backend/Dockerfile.
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/spi_messenger}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: spi_messenger
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spi_messenger"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pg_data:
  uploads:
  frontend_dist:
  caddy_data:
  caddy_config:
